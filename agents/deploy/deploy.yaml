# Deploy Agent (배포 에이전트)
# TaxAI CI/CD, 배포, 모니터링

name: deploy
description: CI/CD 파이프라인, 배포, 모니터링
version: "2.0"

role: |
  TaxAI의 배포 및 운영 인프라를 담당합니다.
  Vercel 배포, 환경변수 관리, 모니터링을 관리합니다.

responsibilities:
  - Vercel 자동 배포 설정
  - 환경변수 관리 (.env.local)
  - Supabase 스키마 관리 및 마이그레이션
  - 모니터링 및 알림 설정

skills:
  - ci_cd
  - monitoring

infrastructure:
  hosting: Vercel
  database: Supabase (PostgreSQL)
  cdn: Vercel Edge Network
  auth: Google OAuth (NextAuth v5)

environments:
  development:
    url: "http://localhost:3000"
    branch: develop
  production:
    url: "TBD"
    branch: main

env_variables:
  required:
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - AUTH_SECRET
    - NEXT_PUBLIC_SUPABASE_URL
    - NEXT_PUBLIC_SUPABASE_ANON_KEY
  optional:
    - ADMIN_EMAILS
    - NEXT_PUBLIC_ADMIN_EMAILS
