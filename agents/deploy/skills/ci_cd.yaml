# Skill: CI/CD Pipeline
# Vercel + GitHub 배포 파이프라인

name: ci_cd
description: Vercel 배포 및 CI/CD 파이프라인 구성
version: "2.0"

capabilities:
  - Vercel 자동 배포 설정
  - 환경변수 관리 (.env.local, Vercel 대시보드)
  - 빌드 검증 (next build)
  - Supabase 스키마 마이그레이션

deployment_checklist:
  pre_deploy:
    - "npm run build 성공 확인"
    - "환경변수 설정 확인"
    - "Supabase 스키마 적용 확인"
  deploy:
    - "Vercel 배포 실행"
    - "배포 URL 확인"
  post_deploy:
    - "핵심 기능 스모크 테스트"
    - "로그인/대시보드 접근 확인"
