# Skill: Design System
# TaxAI 네오브루탈리즘 디자인 시스템

name: design_system
description: 네오브루탈리즘 디자인 토큰 및 컴포넌트 스타일 가이드
version: "2.0"

capabilities:
  - 네오브루탈리즘 디자인 토큰 관리
  - 컬러 팔레트 관리
  - 타이포그래피 시스템
  - 컴포넌트 스타일 규격화

tokens:
  colors:
    primary:
      neo-black: "#000000"
      neo-yellow: "#FFB800"
      neo-cyan: "#00D9FF"
      neo-orange: "#FF6B35"
      neo-pink: "#FF69B4"
    background:
      main: "#F5F0EB"
      card: "#FFFFFF"
    text:
      primary: "#000000"
      secondary: "#6B7280"
      muted: "#9CA3AF"

  typography:
    fonts:
      head: "Outfit (Google Fonts)"
      body: "Pretendard (system-ui fallback)"
    scales:
      page_title: "text-2xl md:text-3xl font-black uppercase"
      section_title: "text-xl font-black"
      card_title: "text-base font-bold"
      body: "text-sm font-medium"
      caption: "text-xs font-bold"

  borders:
    thin: "border-2 border-black"
    default: "border-[3px] border-black"
    thick: "border-4 border-black"

  shadows:
    button: "shadow-[4px_4px_0px_0px_#000]"
    card: "shadow-[8px_8px_0px_0px_#000]"
    input_focus: "shadow-[4px_4px_0px_0px_#FFB800]"

  interactions:
    hover: "hover:-translate-y-1 transition-transform"
    active: "active:translate-x-0.5 active:translate-y-0.5 active:shadow-none"
    transition: "transition-all duration-200"
