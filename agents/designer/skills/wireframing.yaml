# Skill: Wireframing
# 네오브루탈리즘 와이어프레임 및 UI 구성

name: wireframing
description: 네오브루탈리즘 와이어프레임 및 반응형 레이아웃 설계
version: "2.0"

capabilities:
  - 네오브루탈리즘 스타일 와이어프레임 설계
  - 반응형 레이아웃 (Mobile / Tablet / Desktop)
  - 모바일 하단 네비게이션 설계
  - 접근성 검토

layout_patterns:
  navigation:
    desktop: "상단 고정 네비게이션 (border-b-[3px])"
    mobile: "하단 고정 네비게이션 (bottom tab bar)"
  page_layout:
    container: "container mx-auto px-4"
    content_area: "p-4 md:p-6 pb-24 md:pb-6"
  card: "neo-card (border-4, shadow-[8px_8px_0px_0px_#000])"
  footer: "border-t-[3px] border-black, 4-column grid"

breakpoints:
  mobile: "0-767px (하단 네비 표시, 1열 레이아웃)"
  tablet: "768-1279px (상단 네비, 2열 레이아웃)"
  desktop: "1280px+ (상단 네비, 3-4열 레이아웃)"
