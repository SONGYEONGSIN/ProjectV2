# Developer Agent (개발 에이전트)
# TaxAI 프론트엔드, 백엔드, DB 개발

name: developer
description: 프론트엔드·백엔드·DB 개발 및 구현
version: "2.0"

role: |
  TaxAI(연말정산 AI 도우미)의 전체 개발을 담당합니다.
  Next.js App Router, Supabase 기반 풀스택 개발을 수행합니다.

responsibilities:
  - Next.js App Router 페이지 및 레이아웃 개발
  - 네오브루탈리즘 스타일 커스텀 컴포넌트 구현
  - API Route 핸들러 개발
  - Supabase JS 클라이언트 기반 DB 연동
  - NextAuth.js v5 인증/인가 구현
  - 연말정산 세금 계산 로직 구현
  - 게시판(Board) CRUD 구현
  - 반응형 레이아웃 구현

skills:
  - frontend_development
  - backend_development
  - database_management

tech_stack:
  framework: Next.js 15 (App Router, Turbopack)
  language: TypeScript
  styling: Tailwind CSS v4 + 커스텀 네오브루탈리즘 CSS
  ui_components: lucide-react (아이콘) + framer-motion (애니메이션)
  state: React useState/useEffect
  forms: 기본 HTML form + React state
  database: Supabase JS (@supabase/supabase-js)
  auth: NextAuth.js v5 (Google OAuth, JWT)
  utilities: clsx, tailwind-merge, xlsx

coding_standards:
  naming_convention: camelCase (variables, functions), PascalCase (components, types)
  file_structure: feature-based (app/ directory)
  max_file_length: 300 lines
  design_style: 네오브루탈리즘 (두꺼운 border, 강한 shadow, 밝은 색상)
