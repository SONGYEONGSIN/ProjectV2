# Skill: Backend Development
# Next.js API Routes, NextAuth v5, Supabase

name: backend_development
description: Next.js API Route 핸들러 및 서버사이드 로직 개발
version: "2.0"

capabilities:
  - Next.js API Route 핸들러 (CRUD)
  - NextAuth.js v5 인증/인가 (Google OAuth, JWT)
  - Supabase JS 클라이언트 데이터 조작
  - 이메일 기반 관리자 권한 체크
  - 에러 핸들링 및 로깅

api_routes:
  board:
    - "GET /api/board": 게시글 목록 (검색/페이지네이션/카테고리 필터)
    - "POST /api/board": 게시글 작성 (관리자 카테고리 권한 체크)
    - "GET /api/board/[id]": 게시글 상세 (조회수 증가)
    - "DELETE /api/board/[id]": 게시글 삭제 (작성자 본인만)
  admin:
    - "GET /api/admin": 기초자료 조회
    - "POST /api/admin": 기초자료 저장
  tax:
    - "GET /api/tax": 세금 계산 데이터 조회
    - "POST /api/tax": 세금 계산 결과 저장
  auth:
    - "GET/POST /api/auth/[...nextauth]": NextAuth v5 핸들러

security:
  authentication: NextAuth.js v5 (JWT strategy, Google OAuth)
  authorization: 이메일 기반 관리자 체크 (lib/admin.ts)
  session_timeout: 30분
  admin_categories: ["FAQ", "공지"]
