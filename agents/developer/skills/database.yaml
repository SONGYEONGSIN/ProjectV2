# Skill: Database Management
# Supabase (PostgreSQL) 직접 연동

name: database_management
description: Supabase JS 클라이언트 기반 DB 관리
version: "2.0"

capabilities:
  - Supabase JS 클라이언트 (@supabase/supabase-js)
  - SQL 스키마 설계 및 관리 (supabase/schema.sql)
  - Row Level Security (RLS) 정책 관리
  - 인덱스 최적화

database_client:
  library: "@supabase/supabase-js"
  config_file: "lib/supabase.ts"
  usage: |
    import { supabase } from "@/lib/supabase";
    const { data, error } = await supabase.from("table").select("*");

tables:
  admin_data:
    description: 연도별 세금 기초자료
    columns: [id, user_id, year, data (JSONB), created_at, updated_at]
    unique: [user_id, year]
  tax_data:
    description: 세금 계산 결과
    columns: [id, user_id, data (JSONB), created_at, updated_at]
    unique: [user_id]
  board_posts:
    description: 게시판 글
    columns: [id, category, title, content, author_name, author_email, views, is_pinned, created_at, updated_at]
    category_values: ["일반", "질문", "FAQ", "공지"]

indexes:
  - idx_admin_data_user_year: admin_data(user_id, year)
  - idx_tax_data_user: tax_data(user_id)
  - idx_board_posts_created: board_posts(created_at DESC)
  - idx_board_posts_pinned: board_posts(is_pinned, created_at DESC)
