# Skill: Frontend Development
# Next.js 15, React, TypeScript, Tailwind CSS, 네오브루탈리즘

name: frontend_development
description: Next.js 15 App Router 기반 네오브루탈리즘 프론트엔드 개발
version: "2.0"

capabilities:
  - Next.js 15 App Router 페이지/레이아웃 개발
  - 네오브루탈리즘 커스텀 컴포넌트 구현
  - framer-motion 애니메이션 적용
  - lucide-react 아이콘 활용
  - React useState/useEffect 상태 관리
  - 반응형 디자인 (Tailwind CSS v4)
  - 접근성 구현 (ARIA, 키보드 네비게이션)

patterns:
  data_fetching: Server Components + API Routes
  state_management: React built-in (useState, useEffect)
  forms: HTML form + React state
  navigation: Next.js Link + useRouter
  styling: Tailwind CSS + 커스텀 neo-* CSS 클래스

neo_brutalism_classes:
  card: "neo-card (border-4 border-black shadow-[8px_8px_0px_0px_#000])"
  button: "neo-btn (border-3 border-black shadow-[4px_4px_0px_0px_#000])"
  nav_item: "neo-nav-item"
  colors:
    - "bg-neo-yellow (#FFB800)"
    - "bg-neo-cyan (#00D9FF)"
    - "bg-neo-orange (#FF6B35)"
    - "bg-neo-pink (#FF69B4)"
    - "bg-neo-black (#000000)"

page_structure:
  - "app/page.tsx": 랜딩 페이지
  - "app/login/page.tsx": 로그인
  - "app/signup/page.tsx": 회원가입
  - "app/dashboard/page.tsx": 대시보드
  - "app/calculator/page.tsx": 세금 계산기
  - "app/admin/page.tsx": 기초자료 관리
  - "app/board/page.tsx": 게시판 목록
  - "app/board/[id]/page.tsx": 게시판 상세
  - "app/board/write/page.tsx": 글쓰기
