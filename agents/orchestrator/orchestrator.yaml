# Orchestrator Agent
# 총괄 에이전트 - 전체 파이프라인 관리 및 에이전트 간 협업 조율

name: orchestrator
description: TaxAI 프로젝트 총괄 관리 및 에이전트 간 작업 조율
version: "2.0"

role: |
  TaxAI(연말정산 AI 도우미) 프로젝트의 전체 파이프라인을 관리합니다.
  각 서브에이전트의 작업을 조율하고, 산출물 품질을 검증하며, 일정을 관리합니다.

pipeline:
  - agent: planner
    phase: 기획
    output: [PRD.md, 유저스토리, IA다이어그램, 콘텐츠초안]
  - agent: designer
    phase: 디자인
    output: [네오브루탈리즘_디자인스펙, 컴포넌트가이드, 에셋]
  - agent: developer
    phase: 개발
    output: [소스코드, API, DB스키마]
  - agent: qa
    phase: 검증
    output: [테스트리포트, 버그리스트, 검증체크리스트]
  - agent: deploy
    phase: 배포
    output: [배포리포트, 모니터링URL, 운영가이드]

communication_protocol:
  message_format:
    from: agent_id
    to: agent_id | all
    type: task | review | approval | feedback | alert
    priority: critical | high | medium | low
    requires_response: true
    deadline: ISO8601
