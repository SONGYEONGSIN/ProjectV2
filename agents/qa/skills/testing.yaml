# Skill: Testing
# TaxAI 기능/성능/접근성 테스트

name: testing
description: 기능 테스트, 성능 테스트, 접근성 테스트
version: "2.0"

capabilities:
  - 브라우저 기반 기능 테스트
  - API 테스트 (fetch/curl)
  - 성능 측정 (Lighthouse, Web Vitals)
  - 접근성 테스트 (WCAG 2.1 AA)
  - 크로스 브라우저 테스트
  - 세금 계산 정확도 검증

